name: Fetch Product Hunt cohort

# Runs the Product Hunt fetch on a GitHub-hosted runner (open internet), using
# the PH_TOKEN repo secret, and commits data/producthunt_cohort.csv back.

on:
  workflow_dispatch:
    inputs:
      topics:
        description: "Comma-separated PH topic slugs (or 'all')"
        default: "productivity,fintech,health-fitness,developer-tools"
      after:
        description: "Launched after (YYYY-MM-DD)"
        default: "2022-01-01"
      before:
        description: "Launched before (YYYY-MM-DD)"
        default: "2024-01-01"
      per_topic:
        description: "Max apps per topic"
        default: "300"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch cohort
        env:
          PH_TOKEN: ${{ secrets.PH_TOKEN }}
        run: |
          node tools/fetch_producthunt.mjs \
            "${{ github.event.inputs.topics }}" \
            "${{ github.event.inputs.after }}" \
            "${{ github.event.inputs.before }}" \
            "${{ github.event.inputs.per_topic }}"

      - name: Commit cohort CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/producthunt_cohort.csv
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "data: Product Hunt cohort (+topics=${{ github.event.inputs.topics }})"
            git push
          fi
